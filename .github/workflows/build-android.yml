name: Build Android APK / Play Store AAB

# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   • Tag push (v*.*.*) → signed AAB + APK → GitHub Release (fully automated)
#   • Manual dispatch   → choose output format and override version
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Output format'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk   # Debug APK — for internal testing / sideloading
          - aab   # Release AAB — for Google Play Store upload
          - both  # Signed APK + AAB in one run
      version_name:
        description: 'Version name (e.g. 1.2.0) — leave blank to auto-derive from tag'
        required: false
      version_code:
        description: 'Version code (integer, monotonically increasing) — leave blank to use YYYYMMddHHmm'
        required: false

# Cancel in-progress build for same ref to save CI minutes
concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  build-android:
    name: Android Build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Toolchain ───────────────────────────────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: SocialFront/package-lock.json

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Only install what Gradle actually needs — keeps the step fast
          packages: 'tools platform-tools platforms;android-34 build-tools;34.0.0'

      # ── Version resolution ──────────────────────────────────────────────────
      - name: Resolve version name and code
        id: ver
        run: |
          # --- version name ---
          if [[ -n "${{ inputs.version_name }}" ]]; then
            VER="${{ inputs.version_name }}"
          elif [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VER="${GITHUB_REF_NAME#v}"   # strip leading 'v'
          else
            VER="1.0.0"
          fi

          # --- version code (must be a monotonically increasing integer) ---
          if [[ -n "${{ inputs.version_code }}" ]]; then
            CODE="${{ inputs.version_code }}"
          else
            CODE="$(date +%Y%m%d%H%M)"  # 12-digit timestamp — always increases
          fi

          echo "name=$VER"  >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "✅ Version: $VER (code $CODE)"

      # ── Frontend Build ──────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install
        working-directory: SocialFront

      - name: Generate utility tokens
        run: npm run sync:tokens
        working-directory: SocialFront

      - name: Build web assets for mobile
        run: npm run build:mobile
        working-directory: SocialFront
        env:
          # VITE_BASE_URL is baked into the JS bundle at build time.
          # Set this secret to your production backend URL, e.g.:
          #   https://instify-api.onrender.com
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}

      # ── Capacitor ───────────────────────────────────────────────────────────
      - name: Install Capacitor packages
        run: npm install
        working-directory: SocialFront

      - name: Init Capacitor Android project
        # `cap add android` is idempotent — it skips if the folder already exists
        run: |
          npx cap add android 2>&1 | tail -5 || true
        working-directory: SocialFront

      - name: Sync web assets into Android project
        run: npx cap sync android --no-prod
        working-directory: SocialFront

      # ── Android version patch ───────────────────────────────────────────────
      - name: Set versionCode and versionName
        run: |
          GRADLE=SocialFront/android/app/build.gradle
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.ver.outputs.code }}/" "$GRADLE"
          sed -i 's/versionName "[^"]*"/versionName "${{ steps.ver.outputs.name }}"/' "$GRADLE"
          echo "📌 Patched build.gradle:"
          grep -E 'versionCode|versionName' "$GRADLE"

      # ── Keystore setup (signed builds only) ────────────────────────────────
      - name: Decode release keystore
        # Skip if keystore secret is absent (e.g. first-time / forked PRs)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > SocialFront/android/app/keystore.jks
          echo "✅ Keystore decoded: $(wc -c < SocialFront/android/app/keystore.jks) bytes"

      # ── Cache Gradle ────────────────────────────────────────────────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('SocialFront/android/**/*.gradle*', 'SocialFront/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── Build ───────────────────────────────────────────────────────────────

      # Debug APK — no signing needed, for QA / internal testers
      - name: Build debug APK
        if: ${{ inputs.build_type == 'apk' || inputs.build_type == 'both' }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: SocialFront/android

      # Signed release APK — can be distributed outside Play Store
      - name: Build signed release APK
        if: >-
          ${{ (inputs.build_type == 'apk' || inputs.build_type == 'both') &&
              secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: >-
          ./gradlew assembleRelease
          --no-daemon
          --stacktrace
          -Pandroid.injected.signing.store.file=keystore.jks
          -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_STORE_PASSWORD }}
          -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }}
          -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: SocialFront/android

      # Signed release AAB — required format for Google Play Store
      - name: Build signed release AAB (Play Store)
        if: >-
          ${{ (inputs.build_type == 'aab' || inputs.build_type == 'both' || github.ref_type == 'tag') &&
              secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: >-
          ./gradlew bundleRelease
          --no-daemon
          --stacktrace
          -Pandroid.injected.signing.store.file=keystore.jks
          -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_STORE_PASSWORD }}
          -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }}
          -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: SocialFront/android

      # Unsigned AAB — when no keystore secret present, produce an unsigned bundle for review
      - name: Build unsigned release AAB (no keystore)
        if: >-
          ${{ (inputs.build_type == 'aab' || inputs.build_type == 'both' || github.ref_type == 'tag') &&
              secrets.ANDROID_KEYSTORE_BASE64 == '' }}
        run: ./gradlew bundleRelease --no-daemon --stacktrace
        working-directory: SocialFront/android

      # ── Upload Artifacts ────────────────────────────────────────────────────
      - name: Upload debug APK
        if: ${{ inputs.build_type == 'apk' || inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: instify-debug-${{ steps.ver.outputs.name }}.apk
          path: SocialFront/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload release APK
        if: ${{ inputs.build_type == 'apk' || inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: instify-release-${{ steps.ver.outputs.name }}.apk
          path: SocialFront/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload release AAB (Play Store bundle)
        if: ${{ inputs.build_type == 'aab' || inputs.build_type == 'both' || github.ref_type == 'tag' }}
        uses: actions/upload-artifact@v4
        with:
          name: instify-playstore-${{ steps.ver.outputs.name }}.aab
          path: SocialFront/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      # ── GitHub Release (automatic on tag push) ──────────────────────────────
      - name: Create GitHub Release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Instify Android ${{ github.ref_name }}'
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            SocialFront/android/app/build/outputs/apk/release/*.apk
            SocialFront/android/app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Play Store Upload (optional) ────────────────────────────────────────
      # Requires GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret.
      # Set up instructions:
      #   1. Google Play Console → Setup → API access → Create service account
      #   2. Grant "Release manager" role in Play Console
      #   3. Download JSON key, paste contents as the secret
      - name: Upload AAB to Play Store (Internal Testing track)
        if: ${{ github.ref_type == 'tag' && secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: in.instify.app
          releaseFiles: SocialFront/android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
          # Promote to 'alpha' or 'production' track manually in Play Console after QA
