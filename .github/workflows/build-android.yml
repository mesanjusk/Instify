name: Build Android APK / Play Store AAB

# ─────────────────────────────────────────────────────────────────────────────
# Triggers:
#   • Tag push (v*.*.*) → signed AAB + APK → GitHub Release (fully automated)
#   • Manual dispatch   → choose output format and override version
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'SocialFront/**'
      - '.github/workflows/build-android.yml'
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Output format'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk   # Debug APK — for internal testing / sideloading
          - aab   # Release AAB — for Google Play Store upload
          - both  # Signed APK + AAB in one run
      version_name:
        description: 'Version name (e.g. 1.2.0) — leave blank to auto-derive from tag'
        required: false
      version_code:
        description: 'Version code (integer, monotonically increasing) — leave blank to use YYYYMMddHHmm'
        required: false

# Cancel in-progress build for same ref to save CI minutes
concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  build-android:
    name: Android Build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Detect trigger type + available secrets ─────────────────────────────
      # • secrets cannot be used in if: expressions → probe via env vars
      # • push to main   → debug APK only (fast, no signing)
      # • push tag/manual → signed APK + AAB (full release)
      - name: Detect trigger and secrets
        id: secrets
        env:
          _KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          _PLAY:     ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          # keystore / play-store presence
          [ -n "$_KEYSTORE" ] && echo "has_keystore=true"  >> "$GITHUB_OUTPUT" \
                              || echo "has_keystore=false" >> "$GITHUB_OUTPUT"
          [ -n "$_PLAY"     ] && echo "has_play=true"  >> "$GITHUB_OUTPUT" \
                              || echo "has_play=false" >> "$GITHUB_OUTPUT"

          # is_release = tag push OR manual dispatch (anything but a plain branch push)
          if [[ "$GITHUB_REF_TYPE" == "tag" || "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "is_release=true"  >> "$GITHUB_OUTPUT"
            echo "🚀 Release build triggered"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "🔧 CI push detected — debug APK only"
          fi

      # ── Toolchain ───────────────────────────────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: SocialFront/package-lock.json

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools platforms;android-34 build-tools;34.0.0'

      # ── Version resolution ──────────────────────────────────────────────────
      - name: Resolve version name and code
        id: ver
        run: |
          if [[ -n "${{ inputs.version_name }}" ]]; then
            VER="${{ inputs.version_name }}"
          elif [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="1.0.0"
          fi

          if [[ -n "${{ inputs.version_code }}" ]]; then
            CODE="${{ inputs.version_code }}"
          else
            # Unix epoch seconds — always < 2,147,483,647 (int max), always increases
            CODE="$(date +%s)"
          fi

          echo "name=$VER"  >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"
          echo "✅ Version: $VER (code $CODE)"

      # ── Frontend Build ──────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install
        working-directory: SocialFront

      - name: Generate utility tokens
        run: npm run sync:tokens
        working-directory: SocialFront

      - name: Build web assets for mobile
        run: npm run build:mobile
        working-directory: SocialFront
        env:
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}

      # ── Capacitor config ────────────────────────────────────────────────────
      # Write config as JSON — Capacitor reads it natively without TypeScript.
      # Wipe any .ts / .js first so Capacitor never tries to compile them.
      - name: Write capacitor.config.json
        run: |
          rm -f capacitor.config.ts capacitor.config.js
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "in.instify.app",
            "appName": "Instify",
            "webDir": "dist",
            "server": {
              "androidScheme": "https",
              "cleartext": false
            },
            "android": {
              "backgroundColor": "#f4f9f6",
              "captureInput": true,
              "allowMixedContent": false
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 1500,
                "backgroundColor": "#1a7a4a",
                "showSpinner": false
              }
            }
          }
          EOF
        working-directory: SocialFront

      # ── Capacitor ───────────────────────────────────────────────────────────
      - name: Init Capacitor Android project
        run: npx cap add android 2>&1 | tail -5 || true
        working-directory: SocialFront

      - name: Sync web assets into Android project
        run: npx cap sync android
        working-directory: SocialFront

      # ── Android version patch ───────────────────────────────────────────────
      - name: Set versionCode and versionName
        run: |
          GRADLE=SocialFront/android/app/build.gradle
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.ver.outputs.code }}/" "$GRADLE"
          sed -i 's/versionName "[^"]*"/versionName "${{ steps.ver.outputs.name }}"/' "$GRADLE"
          grep -E 'versionCode|versionName' "$GRADLE"

      # ── Keystore setup ──────────────────────────────────────────────────────
      - name: Decode release keystore
        if: steps.secrets.outputs.has_keystore == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode \
            > SocialFront/android/app/keystore.jks
          echo "✅ Keystore: $(wc -c < SocialFront/android/app/keystore.jks) bytes"

      # ── Cache Gradle ────────────────────────────────────────────────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('SocialFront/android/**/*.gradle*', 'SocialFront/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── Build steps ─────────────────────────────────────────────────────────
      # Push to main  → debug APK only (always runs, no signing required)
      # Tag / manual  → signed APK + signed AAB for Play Store

      - name: Build debug APK
        if: >-
          steps.secrets.outputs.is_release == 'false' ||
          inputs.build_type == 'apk' ||
          inputs.build_type == 'both'
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        working-directory: SocialFront/android

      - name: Build signed release APK
        if: >-
          steps.secrets.outputs.is_release == 'true' &&
          steps.secrets.outputs.has_keystore == 'true' &&
          (inputs.build_type == 'apk' || inputs.build_type == 'both' || github.ref_type == 'tag')
        run: >-
          ./gradlew assembleRelease
          --no-daemon
          --stacktrace
          -Pandroid.injected.signing.store.file=keystore.jks
          -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_STORE_PASSWORD }}
          -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }}
          -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: SocialFront/android

      - name: Build signed release AAB (Play Store)
        if: >-
          steps.secrets.outputs.is_release == 'true' &&
          steps.secrets.outputs.has_keystore == 'true' &&
          (inputs.build_type == 'aab' || inputs.build_type == 'both' || github.ref_type == 'tag')
        run: >-
          ./gradlew bundleRelease
          --no-daemon
          --stacktrace
          -Pandroid.injected.signing.store.file=keystore.jks
          -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_STORE_PASSWORD }}
          -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }}
          -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: SocialFront/android

      - name: Build unsigned AAB (no keystore configured)
        if: >-
          steps.secrets.outputs.is_release == 'true' &&
          steps.secrets.outputs.has_keystore == 'false' &&
          (inputs.build_type == 'aab' || inputs.build_type == 'both' || github.ref_type == 'tag')
        run: ./gradlew bundleRelease --no-daemon --stacktrace
        working-directory: SocialFront/android

      # ── Upload Artifacts ────────────────────────────────────────────────────
      - name: Upload debug APK
        if: >-
          steps.secrets.outputs.is_release == 'false' ||
          inputs.build_type == 'apk' ||
          inputs.build_type == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: instify-debug-${{ steps.ver.outputs.name }}
          path: SocialFront/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload release APK
        if: >-
          steps.secrets.outputs.is_release == 'true' &&
          (inputs.build_type == 'apk' || inputs.build_type == 'both' || github.ref_type == 'tag')
        uses: actions/upload-artifact@v4
        with:
          name: instify-release-apk-${{ steps.ver.outputs.name }}
          path: SocialFront/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB (Play Store bundle)
        if: >-
          steps.secrets.outputs.is_release == 'true' &&
          (inputs.build_type == 'aab' || inputs.build_type == 'both' || github.ref_type == 'tag')
        uses: actions/upload-artifact@v4
        with:
          name: instify-playstore-aab-${{ steps.ver.outputs.name }}
          path: SocialFront/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      # ── GitHub Release (automatic on tag push) ──────────────────────────────
      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Instify Android ${{ github.ref_name }}'
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            SocialFront/android/app/build/outputs/apk/release/*.apk
            SocialFront/android/app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Play Store Upload (optional) ────────────────────────────────────────
      # Requires GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret:
      #   1. Play Console → Setup → API access → Create service account
      #   2. Grant "Release manager" role
      #   3. Download JSON key → paste as secret
      - name: Upload AAB to Play Store (Internal Testing)
        if: github.ref_type == 'tag' && steps.secrets.outputs.has_play == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: in.instify.app
          releaseFiles: SocialFront/android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
