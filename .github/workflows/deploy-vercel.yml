name: Deploy Frontend to Vercel

# ─────────────────────────────────────────────────────────────────────────────
# Auto-deploys SocialFront to Vercel on every push to main.
# Only runs when frontend files actually change (saves CI minutes).
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN      — create at vercel.com/account/tokens
#   VERCEL_ORG_ID     — Personal Account: your user ID from vercel.com/account
#                       Team: team ID from team Settings → General
#   VERCEL_PROJECT_ID — from the Vercel project Settings → General
#
# One-time setup (run locally once to link the project):
#   cd SocialFront
#   npx vercel link          ← creates .vercel/project.json with the IDs
#   cat .vercel/project.json ← copy orgId + projectId into GitHub secrets
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'SocialFront/**'
      - '.github/workflows/deploy-vercel.yml'
  workflow_dispatch:

concurrency:
  group: vercel-prod
  cancel-in-progress: true   # cancel older deploy if a newer push arrives

jobs:
  deploy:
    name: Vercel Production Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check Vercel secrets
        id: check
        env:
          _TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  VERCEL_TOKEN is not set — skipping Vercel deploy."
            echo "   Add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID in:"
            echo "   GitHub → mesanjusk/Instify → Settings → Secrets → Actions"
            echo "   PWA is deployed to GitHub Pages instead (deploy-gh-pages.yml)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SocialFront/package-lock.json

      - name: Install Vercel CLI
        if: steps.check.outputs.skip == 'false'
        run: npm install -g vercel@latest

      # Pull Vercel project config + production env vars into .vercel/
      - name: Pull Vercel project settings
        if: steps.check.outputs.skip == 'false'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: SocialFront
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Build locally so we can inspect the output before deploying
      - name: Build for production
        if: steps.check.outputs.skip == 'false'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: SocialFront
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Upload pre-built output — skips Vercel's own build step (faster)
      - name: Deploy pre-built output to Vercel
        if: steps.check.outputs.skip == 'false'
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "✅ Deployed: $URL"
        working-directory: SocialFront
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
