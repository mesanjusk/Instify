name: Deploy PWA to GitHub Pages

# ─────────────────────────────────────────────────────────────────────────────
# Deploys the React frontend to GitHub Pages (mesanjusk.github.io/Instify/).
# Runs automatically whenever main branch changes.
# No extra secrets required — uses GITHUB_TOKEN only.
#
# One-time setup in the repo:
#   Settings → Pages → Source → "Deploy from a branch" → branch: gh-pages / (root)
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'SocialFront/**'
      - '.github/workflows/deploy-gh-pages.yml'
      - '.github/workflows/auto-merge.yml'
  workflow_dispatch:

concurrency:
  group: gh-pages
  cancel-in-progress: true

permissions:
  contents: write   # needed to push to gh-pages branch

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SocialFront/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: SocialFront

      - name: Generate utility tokens
        run: npm run sync:tokens
        working-directory: SocialFront

      # Build with GitHub Pages base path (/Instify = repo name)
      # config.js falls back to https://instify-kfpm.onrender.com so no backend secret needed
      - name: Build for GitHub Pages
        run: npm run build
        working-directory: SocialFront
        env:
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
          VITE_BASE_PATH: /Instify
          VITE_ROUTER_BASENAME: /Instify

      # Stop Vercel from deploying the gh-pages branch.
      # Vercel's Root Directory for this project is "SocialFront", so it reads
      # vercel.json from SocialFront/ on whatever branch it deploys.
      # On gh-pages that dir doesn't exist → build fails with "Root Directory not found".
      #
      # Fix: inject a minimal SocialFront/ stub into dist before pushing so:
      #   1. Vercel finds its Root Directory (SocialFront/) ✓
      #   2. vercel.json inside that dir tells Vercel to skip gh-pages builds ✓
      #   3. A no-op build command prevents any actual build attempt ✓
      - name: Prevent Vercel from re-deploying gh-pages
        run: |
          # vercel.json at dist root (becomes repo root on gh-pages) — belt
          echo '{"github":{"deploymentEnabled":{"gh-pages":false}}}' \
            > SocialFront/dist/vercel.json

          # Stub SocialFront/ inside dist (becomes /SocialFront/ on gh-pages) — suspenders
          # Vercel finds its Root Directory, reads vercel.json, and cancels the deploy.
          mkdir -p SocialFront/dist/SocialFront
          printf '{"name":"gh-pages-stub","version":"0.0.1","private":true}' \
            > SocialFront/dist/SocialFront/package.json
          printf '{"buildCommand":"exit 0","outputDirectory":".","github":{"deploymentEnabled":{"gh-pages":false}}}' \
            > SocialFront/dist/SocialFront/vercel.json

      # Push built dist/ to the gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: SocialFront/dist
          force_orphan: true
          commit_message: 'deploy: ${{ github.sha }}'
