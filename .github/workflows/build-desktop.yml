name: Build Desktop App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0) — used for the release tag'
        required: true
        default: 'v1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            SocialFront/package-lock.json
            electron/package-lock.json

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install
        working-directory: SocialFront

      - name: Generate utility tokens
        run: npm run sync:tokens
        working-directory: SocialFront

      - name: Build desktop frontend
        run: npm run build:desktop
        working-directory: SocialFront

      # ── Backend (production deps only — cuts ~60% off node_modules size) ─
      - name: Install backend production dependencies
        run: npm ci --omit=dev
        working-directory: SocialBackend

      # ── Electron ──────────────────────────────────────────────────────────
      - name: Install electron dependencies
        run: npm install
        working-directory: electron

      # Cache MongoDB binary — only re-download when version string changes
      - name: Cache MongoDB binary
        id: cache-mongo
        uses: actions/cache@v4
        with:
          path: electron/resources/mongodb
          key: mongodb-win-x64-6.0.20

      - name: Download MongoDB 6.0 for Windows x64
        if: steps.cache-mongo.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url  = "https://fastdl.mongodb.org/windows/mongodb-windows-x86_64-6.0.20.zip"
          $zip  = "mongodb.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "mongodb-extracted"
          $mongoDir = Get-ChildItem -Path "mongodb-extracted" -Directory | Select-Object -First 1
          $binSrc   = Join-Path $mongoDir.FullName "bin"
          $binDest  = "electron/resources/mongodb/bin"
          New-Item -ItemType Directory -Force -Path $binDest | Out-Null
          Copy-Item -Path "$binSrc\*" -Destination $binDest -Recurse
          Remove-Item $zip, "mongodb-extracted" -Recurse -Force
          Write-Host "Copied MongoDB binaries:"
          Get-ChildItem $binDest | ForEach-Object { Write-Host "  $($_.Name)" }

      # Cache VC++ redistributable
      - name: Cache VC++ redistributable
        id: cache-vcredist
        uses: actions/cache@v4
        with:
          path: electron/resources/vc_redist.x64.exe
          key: vc-redist-2022-x64

      - name: Download Visual C++ 2022 Redistributable
        if: steps.cache-vcredist.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $dest = "electron/resources"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "$dest/vc_redist.x64.exe"
          Write-Host "Downloaded vc_redist.x64.exe: $((Get-Item "$dest/vc_redist.x64.exe").Length) bytes"

      - name: Build Windows installer
        run: npm run dist:win
        working-directory: electron

      # ── Release ───────────────────────────────────────────────────────────
      - name: Find installer path
        id: installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "electron/dist-electron" -Filter "*.exe" -Recurse |
                 Where-Object { $_.Name -notlike "*unpacked*" } |
                 Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found in electron/dist-electron"; exit 1 }
          echo "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "name=$($exe.Name)"     >> $env:GITHUB_OUTPUT
          echo "Found: $($exe.FullName)"

      - name: Create GitHub Release and upload installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          name: Instify Desktop ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ steps.installer.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
