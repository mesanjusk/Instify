name: Build Desktop App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0) — used for the release tag'
        required: true
        default: 'v1.0.0'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: SocialFront/package-lock.json

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm install
        working-directory: SocialFront

      - name: Generate utility tokens
        run: npm run sync:tokens
        working-directory: SocialFront

      - name: Build desktop frontend
        run: npm run build:desktop
        working-directory: SocialFront

      # ── Electron ──────────────────────────────────────────────────────────
      - name: Install electron dependencies
        run: npm install
        working-directory: electron

      - name: Build Windows installer
        run: npm run dist:win
        working-directory: electron

      # ── Release ───────────────────────────────────────────────────────────
      - name: Find installer path
        id: installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "electron/dist-electron" -Filter "*.exe" -Recurse |
                 Where-Object { $_.Name -notlike "*unpacked*" } |
                 Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found in electron/dist-electron"; exit 1 }
          echo "path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          echo "name=$($exe.Name)"     >> $env:GITHUB_OUTPUT
          echo "Found: $($exe.FullName)"

      - name: Create GitHub Release and upload installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.version }}
          name: Instify Desktop ${{ github.ref_name || inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ steps.installer.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
